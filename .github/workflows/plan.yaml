# Plan pipeline -- runs on pull requests targeting main.
#
# This workflow does everything the validate workflow does, plus it
# generates device configs and diffs them against the current main
# branch configs. The diff is posted as a PR comment so reviewers
# can see exactly what will change on each device before approving.

name: Plan Config Changes

on:
  pull_request:
    branches:
      - main
    paths:
      - 'IAC_Labs/data/**'
      - 'IAC_Labs/schemas/**'
      - 'IAC_Labs/validators/**'
      - 'IAC_Labs/generators/**'
      - 'IAC_Labs/validate.py'

defaults:
  run:
    working-directory: IAC_Labs

jobs:
  plan:
    name: Validate and Plan
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run four-layer validation
        run: uv run python validate.py

      - name: Run pytest suite
        run: uv run pytest -v --tb=short

      - name: Generate configs from PR branch
        run: uv run python -m generators.python.render --output-dir configs-pr

      - name: Generate configs from main branch
        run: |
          git stash
          git checkout main
          uv run python -m generators.python.render --output-dir configs-main 2>/dev/null || echo "No generator on main yet"
          git checkout -
          git stash pop || true

      - name: Generate config diff
        id: diff
        run: |
          if [ -d configs-main ] && [ "$(ls configs-main/*.conf 2>/dev/null)" ]; then
            echo "## Config Change Plan" > plan.md
            echo "" >> plan.md
            echo "Changes that will be applied to devices if this PR is merged:" >> plan.md
            echo "" >> plan.md

            CHANGES=0
            for conf in configs-pr/*.conf; do
              DEVICE=$(basename "$conf" .conf)
              MAIN_CONF="configs-main/${DEVICE}.conf"
              if [ -f "$MAIN_CONF" ]; then
                DIFF=$(diff -u "$MAIN_CONF" "$conf" || true)
                if [ -n "$DIFF" ]; then
                  echo "### ${DEVICE}" >> plan.md
                  echo '```diff' >> plan.md
                  echo "$DIFF" >> plan.md
                  echo '```' >> plan.md
                  echo "" >> plan.md
                  CHANGES=$((CHANGES + 1))
                fi
              else
                echo "### ${DEVICE} (new device)" >> plan.md
                echo "New configuration file with $(wc -l < "$conf") lines." >> plan.md
                echo "" >> plan.md
                CHANGES=$((CHANGES + 1))
              fi
            done

            if [ "$CHANGES" -eq 0 ]; then
              echo "No config changes detected. Data model changes did not affect generated configs." > plan.md
            fi
          else
            echo "## Config Change Plan" > plan.md
            echo "" >> plan.md
            echo "First deployment. All configs are new:" >> plan.md
            echo "" >> plan.md
            for conf in configs-pr/*.conf; do
              DEVICE=$(basename "$conf" .conf)
              echo "- **${DEVICE}**: $(wc -l < "$conf") lines" >> plan.md
            done
          fi

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('IAC_Labs/plan.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: plan
            });
