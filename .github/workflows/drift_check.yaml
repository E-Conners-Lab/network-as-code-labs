# Scheduled drift detection -- runs on a cron schedule.
#
# This workflow periodically compares the running device configs against
# the intended configs generated from the data model. If drift is
# detected, it creates a GitHub issue with the drift report.
#
# Requires a self-hosted runner with access to the ContainerLab devices.

name: Drift Detection

on:
  schedule:
    # Run every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    # Allow manual trigger from the Actions tab

defaults:
  run:
    working-directory: IAC_Labs

jobs:
  drift-check:
    name: Check for Configuration Drift
    runs-on: [self-hosted, clab-runner]
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate intended configs
        run: uv run python -m generators.python.render

      - name: Run drift detection
        id: drift
        run: |
          uv run python -m drift.detect --json > drift-results.json
          uv run python -m drift.detect | tee drift-output.txt
          python - <<'PY'
          import os
          import json
          from pathlib import Path

          results = json.loads(Path("drift-results.json").read_text())
          drifted = [item["device"] for item in results if item["has_drift"]]

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"drift_detected={'true' if drifted else 'false'}\n")
              fh.write(f"drifted_devices={','.join(drifted)}\n")
          PY

      - name: Upload drift artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: |
            IAC_Labs/drift-results.json
            IAC_Labs/drift-output.txt

      - name: Create issue on drift
        if: steps.drift.outputs.drift_detected == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('IAC_Labs/drift-output.txt', 'utf8');
            const timestamp = new Date().toISOString();
            const marker = '<!-- nac-drift-issue -->';
            const body = `${marker}
            ## Drift Detection Report

            Drift was detected during the scheduled check at ${timestamp}.

            Drifted devices: ${process.env.DRIFTED_DEVICES}

            \`\`\`
            ${output}
            \`\`\`

            Review the drift and choose a reconciliation strategy:
            - Remediate: \`uv run python -m drift.reconcile remediate\`
            - Absorb: \`uv run python -m drift.reconcile absorb --device <name>\``;

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'drift,automated',
            });

            const existing = issues.find((issue) => issue.body && issue.body.includes(marker));

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                title: `Configuration drift detected - ${timestamp}`,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Configuration drift detected - ${timestamp}`,
                body,
                labels: ['drift', 'automated']
              });
            }
        env:
          DRIFTED_DEVICES: ${{ steps.drift.outputs.drifted_devices }}
