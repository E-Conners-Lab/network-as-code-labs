# Deploy pipeline -- runs on merge to main.
#
# This workflow generates configs and deploys them to the ContainerLab
# devices via Scrapli. It requires a self-hosted runner with access to
# the ContainerLab management network because GitHub's hosted runners
# cannot reach your lab devices.
#
# Self-hosted runner setup:
#   1. On the VM, install the GitHub Actions runner following:
#      https://docs.github.com/en/actions/hosting-your-own-runners
#   2. Register it with the label "clab-runner"
#   3. The runner needs Docker access and network connectivity to
#      the ContainerLab management subnet (172.20.20.0/24)

name: Deploy to Fabric

on:
  push:
    branches:
      - main
    paths:
      - 'IAC_Labs/data/**'
      - 'IAC_Labs/schemas/**'
      - 'IAC_Labs/generators/**'

defaults:
  run:
    working-directory: IAC_Labs

jobs:
  validate-and-deploy:
    name: Validate, Generate, Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run four-layer validation
        run: uv run python validate.py

      - name: Run pytest suite
        run: uv run pytest -v --tb=short

      - name: Generate device configs
        run: uv run python -m generators.python.render

      - name: Deploy configs via Scrapli (dry run)
        run: uv run python -m deploy.scrapli_deploy --dry-run

      - name: Deploy configs via Scrapli
        run: uv run python -m deploy.scrapli_deploy
        env:
          FRR_USERNAME: root
          FRR_PASSWORD: ""
