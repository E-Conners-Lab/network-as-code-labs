# Validation pipeline -- runs on every push to a feature or hotfix branch.
#
# This is the first gate in the CI/CD pipeline. Every data model change
# must pass all four validation layers before it can be merged. If any
# check fails, the workflow fails and the branch cannot be merged.

name: Validate Data Model

on:
  push:
    branches:
      - 'feature/**'
      - 'hotfix/**'
    paths:
      - 'IAC_Labs/data/**'
      - 'IAC_Labs/schemas/**'
      - 'IAC_Labs/validators/**'
      - 'IAC_Labs/tests/**'
      - 'IAC_Labs/validate.py'
      - 'IAC_Labs/pyproject.toml'
      - 'IAC_Labs/uv.lock'
  workflow_dispatch:

defaults:
  run:
    working-directory: IAC_Labs

jobs:
  validate:
    name: Run Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run four-layer validation
        run: uv run python validate.py

      - name: Run pytest suite
        run: uv run pytest -v --tb=short

      - name: Generate HTML report
        if: always()
        run: |
          mkdir -p reports
          uv run pytest --html=reports/validation-report.html --self-contained-html -v || true

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: IAC_Labs/reports/validation-report.html
          retention-days: 30
