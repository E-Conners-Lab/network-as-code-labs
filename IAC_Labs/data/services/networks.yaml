# L2/L3 network segments mapped to VRFs.
#
# Each segment defines a VLAN, a VXLAN VNI, a subnet, and the VRF it
# belongs to. The gateway address is the anycast gateway that every
# leaf advertises for this segment, providing first-hop redundancy
# without any protocol overhead.

networks:
  - name: prod-web
    vni: 10010
    vlan_id: 10
    subnet: 10.100.10.0/24
    gateway: 10.100.10.1
    vrf: PRODUCTION
    description: "Production web tier"

  - name: prod-app
    vni: 10020
    vlan_id: 20
    subnet: 10.100.20.0/24
    gateway: 10.100.20.1
    vrf: PRODUCTION
    description: "Production application tier"

  - name: prod-db
    vni: 10030
    vlan_id: 30
    subnet: 10.100.30.0/24
    gateway: 10.100.30.1
    vrf: PRODUCTION
    description: "Production database tier"

  - name: dev-general
    vni: 20010
    vlan_id: 110
    subnet: 10.200.10.0/24
    gateway: 10.200.10.1
    vrf: DEVELOPMENT
    description: "Development general purpose"

  - name: mgmt-infra
    vni: 30010
    vlan_id: 900
    subnet: 10.250.10.0/24
    gateway: 10.250.10.1
    vrf: MANAGEMENT
    description: "Infrastructure management"
