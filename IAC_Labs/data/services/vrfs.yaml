# VRF definitions for tenant isolation.
#
# Each VRF gets its own L3 VNI, route distinguisher, and route targets.
# The RD and RT formats follow the ASN:ID convention where the ASN
# matches the fabric ASN and the ID is unique per VRF. Network segments
# in networks.yaml reference these VRFs by name.

vrfs:
  - name: PRODUCTION
    vni: 100000
    rd: "65000:100"
    rt_import:
      - "65000:100"
    rt_export:
      - "65000:100"
    description: "Production workload VRF"

  - name: DEVELOPMENT
    vni: 200000
    rd: "65000:200"
    rt_import:
      - "65000:200"
    rt_export:
      - "65000:200"
    description: "Development and testing VRF"

  - name: MANAGEMENT
    vni: 300000
    rd: "65000:300"
    rt_import:
      - "65000:300"
    rt_export:
      - "65000:300"
    description: "Management and infrastructure VRF"
