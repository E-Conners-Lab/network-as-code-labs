# ContainerLab topology for the Network as Code spine-leaf fabric.
#
# This defines a 6-node VXLAN/EVPN fabric with two spines (acting as
# route reflectors), two standard leafs, and two border leafs. Each
# spine connects to every leaf and border, creating a full mesh between
# tiers. The management network is auto-provisioned by ContainerLab
# on the 172.20.20.0/24 subnet.
#
# The custom frr_daemons file enables ospfd and bgpd on startup so the
# deployment script can load configs without restarting FRR (which would
# destroy the veth interfaces ContainerLab creates).
#
# Deploy with: sudo containerlab deploy --topo containerlab/topology.yaml
# Destroy with: sudo containerlab destroy --topo containerlab/topology.yaml

name: nac-spine-leaf

mgmt:
  network: nac-mgmt
  ipv4-subnet: 172.20.21.0/24

topology:
  kinds:
    linux:
      image: quay.io/frrouting/frr:10.3.1
      binds:
        - frr_daemons:/etc/frr/daemons

  nodes:
    spine1:
      kind: linux
      mgmt-ipv4: 172.20.21.101
    spine2:
      kind: linux
      mgmt-ipv4: 172.20.21.102
    leaf1:
      kind: linux
      mgmt-ipv4: 172.20.21.11
    leaf2:
      kind: linux
      mgmt-ipv4: 172.20.21.12
    border1:
      kind: linux
      mgmt-ipv4: 172.20.21.21
    border2:
      kind: linux
      mgmt-ipv4: 172.20.21.22

  links:
    # Spine1 fabric links
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["spine1:eth3", "border1:eth1"]
    - endpoints: ["spine1:eth4", "border2:eth1"]
    # Spine2 fabric links
    - endpoints: ["spine2:eth1", "leaf1:eth2"]
    - endpoints: ["spine2:eth2", "leaf2:eth2"]
    - endpoints: ["spine2:eth3", "border1:eth2"]
    - endpoints: ["spine2:eth4", "border2:eth2"]
