# Ansible inventory for the NaC spine-leaf fabric.
# Each host carries the variables needed to render its FRR config.
# In a real pipeline, a script would generate this from the data model.

all:
  children:
    spines:
      hosts:
        spine1:
          loopback: "10.0.0.1/32"
          loopback_ip: "10.0.0.1"
          asn: 65000
          route_reflector: true
          cluster_id: "10.0.0.1"
          role_template: "spine.conf.j2"
          fabric_links:
            - interface: eth1
              ip: "10.0.1.0/31"
              peer: leaf1
              peer_intf: eth1
            - interface: eth2
              ip: "10.0.1.2/31"
              peer: leaf2
              peer_intf: eth1
            - interface: eth3
              ip: "10.0.1.4/31"
              peer: border1
              peer_intf: eth1
            - interface: eth4
              ip: "10.0.1.6/31"
              peer: border2
              peer_intf: eth1
        spine2:
          loopback: "10.0.0.2/32"
          loopback_ip: "10.0.0.2"
          asn: 65000
          route_reflector: true
          cluster_id: "10.0.0.2"
          role_template: "spine.conf.j2"
          fabric_links:
            - interface: eth1
              ip: "10.0.1.8/31"
              peer: leaf1
              peer_intf: eth2
            - interface: eth2
              ip: "10.0.1.10/31"
              peer: leaf2
              peer_intf: eth2
            - interface: eth3
              ip: "10.0.1.12/31"
              peer: border1
              peer_intf: eth2
            - interface: eth4
              ip: "10.0.1.14/31"
              peer: border2
              peer_intf: eth2
    leafs:
      hosts:
        leaf1:
          loopback: "10.0.0.11/32"
          loopback_ip: "10.0.0.11"
          asn: 65000
          route_reflector: false
          role_template: "leaf.conf.j2"
          fabric_links:
            - interface: eth1
              ip: "10.0.1.1/31"
              peer: spine1
              peer_intf: eth1
            - interface: eth2
              ip: "10.0.1.9/31"
              peer: spine2
              peer_intf: eth1
        leaf2:
          loopback: "10.0.0.12/32"
          loopback_ip: "10.0.0.12"
          asn: 65000
          route_reflector: false
          role_template: "leaf.conf.j2"
          fabric_links:
            - interface: eth1
              ip: "10.0.1.3/31"
              peer: spine1
              peer_intf: eth2
            - interface: eth2
              ip: "10.0.1.11/31"
              peer: spine2
              peer_intf: eth2
    borders:
      hosts:
        border1:
          loopback: "10.0.0.21/32"
          loopback_ip: "10.0.0.21"
          asn: 65000
          route_reflector: false
          role_template: "border.conf.j2"
          fabric_links:
            - interface: eth1
              ip: "10.0.1.5/31"
              peer: spine1
              peer_intf: eth3
            - interface: eth2
              ip: "10.0.1.13/31"
              peer: spine2
              peer_intf: eth3
        border2:
          loopback: "10.0.0.22/32"
          loopback_ip: "10.0.0.22"
          asn: 65000
          route_reflector: false
          role_template: "border.conf.j2"
          fabric_links:
            - interface: eth1
              ip: "10.0.1.7/31"
              peer: spine1
              peer_intf: eth4
            - interface: eth2
              ip: "10.0.1.15/31"
              peer: spine2
              peer_intf: eth4
